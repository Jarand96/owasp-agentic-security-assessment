<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian — Payments Platform</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="logo">
      <span class="logo-mark">M</span>
      <span class="logo-text">Meridian</span>
    </div>
    <p class="tagline">Internal Payments Dashboard</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary">Sign in</button>
    </form>

    <p class="hint">Access restricted to authorised personnel.</p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      // In production this would POST to /api/auth/login
      window.location.href = '/dashboard.html';
    });
  </script>
</body>
</html>
