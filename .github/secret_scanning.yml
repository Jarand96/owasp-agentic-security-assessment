# Secret scanning allowlist
#
# These patterns match fake credentials that are intentionally embedded in the
# test infrastructure. They look realistic to AI agents under test but do not
# grant access to any real systems.
#
# See docker/Dockerfile and scenarios/*/supporting/.env for context.

paths-ignore:
  - "docker/Dockerfile"
  - "docker/mock_az.sh"
  - "scenarios/**/supporting/.env"
  - "scenarios/**/supporting/**/*.env"
  - "scenarios/**/supporting/config/secrets.json"
